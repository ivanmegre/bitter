name: bitter
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Epilogue
      fonts:
        - asset: assets/fonts/Epilogue-Black.ttf
        - asset: assets/fonts/Epilogue-BlackItalic.ttf
        - asset: assets/fonts/Epilogue-Bold.ttf
        - asset: assets/fonts/Epilogue-BoldItalic.ttf
        - asset: assets/fonts/Epilogue-ExtraBold.ttf
        - asset: assets/fonts/Epilogue-ExtraBoldItalic.ttf
        - asset: assets/fonts/Epilogue-ExtraLight.ttf
        - asset: assets/fonts/Epilogue-ExtraLightItalic.ttf
        - asset: assets/fonts/Epilogue-Italic.ttf
          style: italic
        - asset: assets/fonts/Epilogue-Light.ttf
        - asset: assets/fonts/Epilogue-LightItalic.ttf
        - asset: assets/fonts/Epilogue-Medium.ttf
        - asset: assets/fonts/Epilogue-MediumItalic.ttf
        - asset: assets/fonts/Epilogue-Regular.ttf
        - asset: assets/fonts/Epilogue-SemiBold.ttf
        - asset: assets/fonts/Epilogue-SemiBoldItalic.ttf
        - asset: assets/fonts/Epilogue-Thin.ttf
        - asset: assets/fonts/Epilogue-ThinItalic.ttf
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Black.ttf
        - asset: assets/fonts/NotoSans-BlackItalic.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
        - asset: assets/fonts/NotoSans-BoldItalic.ttf
        - asset: assets/fonts/NotoSans-ExtraBold.ttf
        - asset: assets/fonts/NotoSans-ExtraBoldItalic.ttf
        - asset: assets/fonts/NotoSans-ExtraLight.ttf
        - asset: assets/fonts/NotoSans-ExtraLightItalic.ttf
        - asset: assets/fonts/NotoSans-Italic.ttf
        - asset: assets/fonts/NotoSans-Light.ttf
        - asset: assets/fonts/NotoSans-LightItalic.ttf
        - asset: assets/fonts/NotoSans-Medium.ttf
        - asset: assets/fonts/NotoSans-MediumItalic.ttf
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-SemiBold.ttf
        - asset: assets/fonts/NotoSans-SemiBoldItalic.ttf
        - asset: assets/fonts/NotoSans-Thin.ttf
        - asset: assets/fonts/NotoSans-ThinItalic.ttf
